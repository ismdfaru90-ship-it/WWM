[providers]
python = "3.13"

[phases.setup]
nixPkgs = ["python313", "python313Packages.poetry"]

[phases.install]
cmds = ["pip install poetry==1.8.5", "poetry config virtualenvs.create false", "poetry install --no-interaction --no-ansi --without dev"]

[deployment]
startCommand = "cd /app && PYTHONPATH=/app poetry run uvicorn openhands.app_server.app:app --host 0.0.0.0 --port 3000"
